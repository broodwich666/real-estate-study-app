<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<title>NY Real Estate Study</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
<header><div><small>NY REAL ESTATE</small><h1 id="pageTitle">Notes</h1></div><button id="newTop" class="compose">✎</button></header>
<main>
<section id="notes" class="screen active">
<input id="noteSearch" class="search" placeholder="Search Notes">
<div class="notesShell">
<aside>
<div class="label">Folders</div>
<button class="folder active" data-folder="all">📁 <span>All Notes</span><b id="allCount">0</b></button>
<button class="folder" data-folder="course">📘 <span>Course Notes</span><b id="courseCount">0</b></button>
<button class="folder" data-folder="personal">📝 <span>Personal Notes</span><b id="personalCount">0</b></button>
</aside>
<div class="notesListPane"><button id="newNote" class="yellow full">＋ New Note</button><div id="notesList"></div></div>
</div>
</section>
<section id="editor" class="screen">
<div class="toolbar"><button id="backNotes" class="link">‹ Notes</button><button id="doneNote" class="link strong">Done</button></div>
<select id="noteFolder"><option value="course">Course Notes</option><option value="personal">Personal Notes</option></select>
<input id="noteTitle" class="titleInput" placeholder="Title">
<textarea id="noteBody" placeholder="Paste or type your notes here…"></textarea>
<button id="deleteNote" class="delete full">Delete Note</button>
</section>
<section id="chapters" class="screen"><input id="chapterSearch" class="search" placeholder="Search Chapters"><div id="chapterList"></div></section>
<section id="chapter" class="screen"><button id="backChapters" class="link">‹ Chapters</button><h2 id="chapterTitle"></h2><p id="chapterMeta"></p><button id="studyChapter" class="blue full">Study This Chapter</button><button id="chapterIndex" class="white full">View in Flashcard Index</button></section>
<section id="study" class="screen">
<div class="studyHead"><button id="prev" class="round">‹</button><div><small id="studyChapterName"></small><b id="studyCounter"></b></div><button id="next" class="round">›</button></div>
<div class="progress"><i id="studyProgress"></i></div>
<button id="card" class="card"><span id="side">Question</span><strong id="cardText"></strong><em>Tap to flip</em></button>
<div class="two"><button id="hard" class="white">Need Practice</button><button id="know" class="blue">Know It</button></div>
<button id="favorite" class="white full">☆ Favorite</button>
</section>
<section id="index" class="screen"><input id="indexSearch" class="search" placeholder="Search Flashcards"><select id="indexFilter"></select><div id="indexList"></div></section>
<section id="progressScreen" class="screen"><div class="metrics"><div><span>Chapters</span><b id="mChapters">0</b></div><div><span>Cards</span><b id="mCards">0</b></div><div><span>Known</span><b id="mKnown">0</b></div><div><span>Practice</span><b id="mPractice">0</b></div></div><div class="panel"><h2>Overall Progress</h2><div class="progress big"><i id="overall"></i></div><p id="overallText"></p></div><button id="studyAll" class="blue full">Study All Chapters</button><button id="studyHard" class="white full">Study Need Practice</button><button id="studyFav" class="white full">Study Favorites</button></section>
<section id="searchScreen" class="screen"><input id="globalSearch" class="search" placeholder="Search Everything"><div id="globalResults"></div></section>
</main>
<nav>
<button class="tab active" data-screen="notes" data-title="Notes">📝<small>Notes</small></button>
<button class="tab" data-screen="chapters" data-title="Chapters">📚<small>Chapters</small></button>
<button class="tab" data-screen="index" data-title="Flashcard Index">▤<small>Index</small></button>
<button class="tab" data-screen="progressScreen" data-title="Progress">◉<small>Progress</small></button>
<button class="tab" data-screen="searchScreen" data-title="Search">⌕<small>Search</small></button>
</nav>
</div>
<script src="data.js"></script><script src="app.js"></script>
</body></html>
