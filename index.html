<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#f2f2f7">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-title" content="REFLASHAPP">
<title>Zad's REFLASHAPP</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
<header class="topbar">
  <div>
    <div class="eyebrow">Zad’s REFLASHAPP</div>
    <h1 id="pageTitle">Notes</h1>
  </div>
  <button id="newNoteTop" class="iconButton">✎</button>
</header>

<main>
<section id="notesScreen" class="screen active">
  <div class="searchWrap"><input id="notesSearch" type="search" placeholder="Search Notes"></div>
  <div class="folderTabs">
    <button class="folderTab active" data-folder="all">All Notes</button>
    <button class="folderTab" data-folder="course">Course Notes</button>
    <button class="folderTab" data-folder="personal">Personal Notes</button>
  </div>
  <button class="newNoteButton" id="newNoteButton">＋ New Note</button>
  <div id="notesList"></div>
</section>

<section id="editorScreen" class="screen">
  <div class="editorToolbar">
    <button id="backToNotes" class="textButton">‹ Notes</button>
    <span id="saveStatus">Saved</span>
  </div>
  <select id="noteFolder">
    <option value="personal">Personal Notes</option>
  </select>
  <input id="noteTitle" class="noteTitleInput" placeholder="Title">
  <textarea id="noteBody" class="noteBodyInput" placeholder="Start typing or paste your notes…"></textarea>
  <div class="bottomDoneBar">
    <button id="doneNote" class="doneButton">Save & Done</button>
  </div>
  <button id="deleteNote" class="deleteButton">Delete Note</button>
</section>

<section id="courseNoteScreen" class="screen">
  <button id="backFromCourseNote" class="textButton">‹ Notes</button>
  <h2 id="courseNoteTitle"></h2>
  <pre id="courseNoteBody"></pre>
</section>

<section id="chaptersScreen" class="screen">
  <div class="searchWrap"><input id="chapterSearch" type="search" placeholder="Search Chapters"></div>
  <div id="chapterList"></div>
</section>

<section id="chapterScreen" class="screen">
  <button id="backToChapters" class="textButton">‹ Chapters</button>
  <h2 id="chapterTitle"></h2>
  <div class="chapterStats" id="chapterStats"></div>
  <button id="studyChapter" class="primaryButton">Study This Chapter</button>
  <button id="viewChapterIndex" class="secondaryButton">View Flashcard Index</button>
</section>

<section id="studyScreen" class="screen">
  <div class="studyTop">
    <button id="prevCard" class="roundButton">‹</button>
    <div>
      <div id="studyChapterTitle" class="studyChapterTitle"></div>
      <div id="studyCounter" class="studyCounter"></div>
    </div>
    <button id="nextCard" class="roundButton">›</button>
  </div>
  <div class="progress"><i id="studyProgress"></i></div>
  <button id="flashcard" class="flashcard">
    <span id="cardSide" class="cardSide">Question</span>
    <strong id="cardText"></strong>
    <em>Tap to flip</em>
  </button>
  <div class="studyActions">
    <button id="needPractice" class="secondaryButton">Need Practice</button>
    <button id="knowIt" class="primaryButton">Know It</button>
  </div>
  <button id="favoriteCard" class="secondaryButton full">☆ Favorite</button>
</section>

<section id="indexScreen" class="screen">
  <div class="searchWrap"><input id="indexSearch" type="search" placeholder="Search Flashcards"></div>
  <select id="indexChapterFilter"></select>
  <div id="indexList"></div>
</section>

<section id="dashboardScreen" class="screen">
  <div class="dashboardGrid">
    <div class="metric"><span>Chapters</span><b id="metricChapters">19</b></div>
    <div class="metric"><span>Flashcards</span><b id="metricCards">0</b></div>
    <div class="metric"><span>Known</span><b id="metricKnown">0</b></div>
    <div class="metric"><span>Need Practice</span><b id="metricPractice">0</b></div>
  </div>
  <div class="dashboardCard">
    <h2>Study Progress</h2>
    <div class="progress large"><i id="overallProgress"></i></div>
    <p id="overallProgressText"></p>
  </div>
  <button id="studyAll" class="primaryButton">Study All Chapters</button>
  <button id="studyPractice" class="secondaryButton">Study Need Practice</button>
  <button id="studyFavorites" class="secondaryButton">Study Favorites</button>
</section>

<section id="searchScreen" class="screen">
  <div class="searchWrap"><input id="globalSearch" type="search" placeholder="Search Everything"></div>
  <div id="globalResults"></div>
</section>
</main>

<nav class="tabbar">
  <button class="tab active" data-screen="notesScreen" data-title="Notes"><span>📝</span><small>Notes</small></button>
  <button class="tab" data-screen="chaptersScreen" data-title="Chapters"><span>📚</span><small>Chapters</small></button>
  <button class="tab" data-screen="indexScreen" data-title="Flashcard Index"><span>▤</span><small>Index</small></button>
  <button class="tab" data-screen="dashboardScreen" data-title="Dashboard"><span>◉</span><small>Progress</small></button>
  <button class="tab" data-screen="searchScreen" data-title="Search"><span>⌕</span><small>Search</small></button>
</nav>
</div>
<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
